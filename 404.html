<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
</head>
<body>
    <script>
        const match = window.location.pathname.match(/\/dispositivo\/(\d+)\/?$/);
        if (match) {
            const basePath = window.location.pathname.replace(/\/dispositivo\/\d+\/?$/, '/');
            window.location.replace(`${window.location.origin}${basePath}?device=${match[1]}`);
        } else {
            window.location.replace(`${window.location.origin}/`);
        }
    </script>
</body>
</html>
